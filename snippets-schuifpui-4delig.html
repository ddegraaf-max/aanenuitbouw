<!-- ============================================================
     4. SVG-WEERGAVE — vier panelen
     ============================================================ -->

<script>
// De bestaande schuifpui tekent 2 vakken. Voor de 4-delige:
// zelfde totale breedte, maar 4 gelijke panelen met overlap-suggestie.
// Voorbeeldfunctie — pas breedte/hoogte/kleurvariabelen aan op de
// bestaande teken-functie in jouw bestand:

function tekenSchuifpui4Delig(svg, x, y, breedte, hoogte, kaderKleur) {
  const paneelBreedte = breedte / 4;
  for (let i = 0; i < 4; i++) {
    const px = x + i * paneelBreedte;
    // Paneelkader
    svg.innerHTML += `<rect x="${px}" y="${y}" width="${paneelBreedte}" height="${hoogte}"
      fill="#eaf1fb" stroke="${kaderKleur}" stroke-width="3"/>`;
    // Handgreepje op paneel 2 en 3 (middelste panelen schuiven)
    if (i === 1 || i === 2) {
      svg.innerHTML += `<circle cx="${px + paneelBreedte - 8}" cy="${y + hoogte / 2}" r="2.5"
        fill="${kaderKleur}"/>`;
    }
  }
}

// Aanroepen op de plek waar nu op puitype wordt gekozen, bijv.:
// if (pui === 'schuifpui-4delig') tekenSchuifpui4Delig(...);
</script>
